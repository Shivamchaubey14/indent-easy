<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Please Wait - STN Preparation</title>
    <style>
        :root {
            --primary-dark: #313647;
            --primary-light: #435663;
            --accent-green: #A3B087;
            --accent-red: #EA5B6F;
            --accent-yellow: #FFF8D4;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --bg-light: #f8f9fa;
            --border-color: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            text-align: center;
            background: var(--accent-yellow);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-red), var(--accent-green));
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .spinner-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border: 4px solid rgba(163, 176, 135, 0.2);
            border-top: 4px solid var(--accent-green);
            border-right: 4px solid var(--accent-red);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 8px 20px rgba(49, 54, 71, 0.1);
        }

        .spinner::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            color: var(--primary-dark);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: -0.5px;
            animation: bounce 2s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--primary-light);
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-green), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(163, 176, 135, 0.3);
            animation: pulse 2s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.2s);
        }

        .icon-circle:nth-child(1) { --i: 0; }
        .icon-circle:nth-child(2) { --i: 1; }
        .icon-circle:nth-child(3) { --i: 2; }

        p {
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin: 1.5rem 0 2rem;
            line-height: 1.6;
            font-weight: 400;
            background: rgba(163, 176, 135, 0.1);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(163, 176, 135, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(163, 176, 135, 0.2);
            border-radius: 4px;
            margin: 2rem 0 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-red));
            border-radius: 4px;
            animation: progress 2.5s ease-in-out infinite;
            transform-origin: left;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
            background: var(--accent-red);
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
            background: var(--primary-dark);
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .timestamp {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .timestamp i {
            color: var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .icon-circle {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        
            p {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .icon-container {
                gap: 1rem;
            }

            .icon-circle {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }

        /* Floating shapes background */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .floating-shapes div {
            position: absolute;
            background: rgba(163, 176, 135, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .floating-shapes div:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-shapes div:nth-child(2) {
            width: 120px;
            height: 120px;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        .floating-shapes div:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 20%;
            right: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Floating background shapes -->
        <div class="floating-shapes">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <!-- Spinner Section -->
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>

        <!-- Icon Row -->
        <div class="icon-container">
            <div class="icon-circle">
                <i class="fas fa-truck"></i>
            </div>
            <div class="icon-circle">
                <i class="fas fa-file-alt"></i>
            </div>
            <div class="icon-circle">
                <i class="fas fa-clock"></i>
            </div>
        </div>

        <!-- Main Message -->
        <h1>Please Wait...</h1>
        <div class="subtitle">STN Sheet Preparation</div>
        
        <p>
            <i class="fas fa-spinner fa-pulse" style="margin-right: 10px;"></i>
            Logistics Department Is Preparing S.T.N Sheet
        </p>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Loading Dots -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Timestamp -->
        <div class="timestamp">
            <i class="fas fa-calendar-alt"></i>
            <span id="currentTime"></span>
        </div>
    </div>

    <script>
        // Update timestamp every second
        function updateTimestamp() {
            const now = new Date();
            const options = { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            const timeString = now.toLocaleTimeString('en-US', options);
            const dateString = now.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
            document.getElementById('currentTime').textContent = `${dateString} ${timeString}`;
        }

        updateTimestamp();
        setInterval(updateTimestamp, 1000);

        // Add a subtle animation to the main container
        document.querySelector('.container').addEventListener('mouseenter', function(e) {
            this.style.transform = 'scale(1.02)';
        });

        document.querySelector('.container').addEventListener('mouseleave', function(e) {
            this.style.transform = 'scale(1)';
        });

        // Simulate loading progress (optional)
        let progress = 0;
        const progressFill = document.querySelector('.progress-fill');
        
        setInterval(() => {
            progress = Math.random() * 100;
            progressFill.style.width = progress + '%';
        }, 3000);
    </script>
</body>
</html>
