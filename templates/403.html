<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>403 - Access Restricted</title>
    <style>
        :root {
            --color-bg: #f4f4f4;
            --color-card: #D8C4B6;
            --color-error: #e74c3c;
            --color-text: #333;
            --color-accent: #313647;
            --color-accent-hover: #313647;
            --color-secondary: #313647;
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 6px 12px rgba(0, 0, 0, 0.15);
            --border-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }

        /* Background subtle pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(232, 213, 201, 0.2) 0px, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(216, 196, 182, 0.15) 0px, transparent 50%);
            z-index: -1;
        }

        /* Animated floating elements */
        .floating-element {
            position: absolute;
            background: rgba(216, 196, 182, 0.1);
            border-radius: 50%;
            z-index: -1;
        }

        .floating-element:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 15%;
            left: 10%;
            animation: float 20s ease-in-out infinite;
        }

        .floating-element:nth-child(2) {
            width: 120px;
            height: 120px;
            bottom: 20%;
            right: 15%;
            animation: float 25s ease-in-out infinite reverse;
        }

        .floating-element:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 60%;
            left: 85%;
            animation: float 18s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            33% {
                transform: translateY(-20px) rotate(120deg);
            }
            66% {
                transform: translateY(10px) rotate(240deg);
            }
        }

        .container {
            text-align: center;
            background-color: var(--color-card);
            padding: 50px 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .container:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error code with animation */
        .error-code-container {
            position: relative;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 100px;
            font-weight: 700;
            color: var(--color-error);
            margin: 0;
            letter-spacing: -3px;
            position: relative;
            display: inline-block;
        }

        .error-code::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--color-error), transparent);
            border-radius: 2px;
            animation: pulseLine 2s ease-in-out infinite;
        }

        @keyframes pulseLine {
            0%, 100% {
                opacity: 0.5;
                width: 100px;
            }
            50% {
                opacity: 1;
                width: 140px;
            }
        }

        /* Animated lock icon */
        .lock-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 25px;
            position: relative;
            animation: lockPulse 4s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .lock-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 3px 6px rgba(231, 76, 60, 0.2));
        }

        /* Message styling */
        .message {
            font-size: 24px;
            color: var(--color-secondary);
            margin-top: 30px;
            margin-bottom: 30px;
            font-weight: 500;
            line-height: 1.4;
            animation: fadeIn 0.8s ease-out 0.3s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Button styling */
        .btn-container {
            margin-top: 20px;
            animation: fadeIn 0.8s ease-out 0.5s forwards;
            opacity: 0;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            background-color: var(--color-accent);
            color: #fff;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(55, 52, 219, 0.2);
        }

        .btn:hover {
            background-color: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(55, 52, 219, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .btn:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        /* Status message */
        .status-message {
            font-size: 14px;
            color: rgba(51, 51, 51, 0.7);
            margin-top: 25px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            border-left: 3px solid var(--color-secondary);
            animation: fadeIn 0.8s ease-out 0.7s forwards;
            opacity: 0;
            text-align: left;
        }

        .status-message strong {
            color: var(--color-secondary);
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 0 20px;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            .message {
                font-size: 20px;
            }
            
            .lock-icon {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .error-code {
                font-size: 70px;
            }
            
            .message {
                font-size: 18px;
            }
            
            .btn {
                padding: 12px 24px;
                font-size: 15px;
                width: 100%;
            }
        }

        /* Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            .container, .message, .btn-container, .status-message {
                animation: none;
                opacity: 1;
                transform: none;
            }
            
            .error-code::after, .lock-icon, .floating-element {
                animation: none;
            }
            
            .btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <!-- Floating background elements -->
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    
    <div class="container">
        <!-- Lock Icon -->
        <div class="lock-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C9.23858 2 7 4.23858 7 7V10H6C4.89543 10 4 10.8954 4 12V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V12C20 10.8954 19.1046 10 18 10H17V7C17 4.23858 14.7614 2 12 2Z" fill="#e74c3c"/>
                <path d="M12 13C10.8954 13 10 13.8954 10 15C10 16.1046 10.8954 17 12 17C13.1046 17 14 16.1046 14 15C14 13.8954 13.1046 13 12 13Z" fill="#D8C4B6"/>
                <path d="M9 10V7C9 5.34315 10.3431 4 12 4C13.6569 4 15 5.34315 15 7V10H9Z" fill="#D8C4B6"/>
            </svg>
        </div>
        
        <!-- Error Code -->
        <div class="error-code-container">
            <h1 class="error-code">403</h1>
        </div>
        
        <!-- Message -->
        <p class="message">Sorry, you do not have permission to access this page.</p>
        
        <!-- Button -->
        <div class="btn-container">
            <a href="/" class="btn">Go to Home</a>
        </div>
        
        <!-- Status Message -->
        <div class="status-message">
            <strong>System Status:</strong> This is a deliberate access restriction. 
            If you believe this is an error, please contact your system administrator with your user ID.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Add click effect to button
            const btn = document.querySelector('.btn');
            
            btn.addEventListener('click', function(e) {
                // Create ripple effect
                const ripple = document.createElement('span');
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.6);
                    transform: scale(0);
                    animation: ripple-animation 0.6s linear;
                    width: ${size}px;
                    height: ${size}px;
                    top: ${y}px;
                    left: ${x}px;
                `;
                
                btn.appendChild(ripple);
                
                // Remove ripple after animation
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
            
            // Add subtle hover effect to container
            const container = document.querySelector('.container');
            
            container.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            
            container.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
            
            // Error code hover effect
            const errorCode = document.querySelector('.error-code');
            
            errorCode.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.05)';
                this.style.transition = 'transform 0.3s ease';
            });
            
            errorCode.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
            
            // Handle reduced motion preference
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelectorAll('*').forEach(el => {
                    el.style.animation = 'none !important';
                    el.style.transition = 'none !important';
                });
            }
        });
    </script>
</body>
</html>
