<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Report</title>
    <style>
        /* A style for pdf to be generated. */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            width: 100px;
            height: auto;
            max-height: 50px;
        }
        .header-text {
            flex: 1;
            text-align: center;
        }
        .content {
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        .footer {
            text-align: center;
            font-size: small;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ logo_url }}" alt="Shwetdhara Logo" class="logo">
        <div class="header-text">
            <h1>Order Report</h1>
            <h2>Generated By: {{ request.user.username }}</h2>
        </div>
    </div>

    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>Field 1</th>
                    <th>Field 2</th>
                    <th>Field 3</th>
                    <th>Field 4</th>
                    <th>Field 5</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>{{ order.field1 }}</td>
                    <td>{{ order.field2 }}</td>
                    <td>{{ order.field3 }}</td>
                    <td>{{ order.field4 }}</td>
                    <td>{{ order.field5 }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <p>Generated on {{ order.created_at }}</p>
    </div>
</body>
</html>
