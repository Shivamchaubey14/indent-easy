{% extends "base.html" %} 

{% block content %}
<div class="order-placed-container">
  <div class="order-placed-content">
    <div class="order-placed-icon">
      <svg
        class="checkmark"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 52 52"
      >
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
        <path class="checkmark-check" fill="none" d="M16 26l7 7 13-13" />
      </svg>
    </div>
    <p class="order-placed-text">
      <span class="animated-text">MAIL SEND...</span>
    </p>
  </div>
</div>

<style>
  .order-placed-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f9f9f9;
  }

  .order-placed-content {
    text-align: center;
    color: #333;
  }

  .order-placed-icon {
    margin-bottom: 20px;
  }

  .checkmark {
    width: 80px;
    height: 80px;
    stroke: #4caf50;
    stroke-width: 3;
  }

  .checkmark-circle {
    stroke-dasharray: 166;
    stroke-dashoffset: 166;
    stroke-width: 2;
    animation: circle-animation 0.6s ease-out forwards;
  }

  .checkmark-check {
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    stroke-width: 2;
    animation: check-animation 0.3s ease-out 0.6s forwards;
  }

  @keyframes circle-animation {
    to {
      stroke-dashoffset: 0;
    }
  }

  @keyframes check-animation {
    to {
      stroke-dashoffset: 0;
    }
  }

  .animated-text {
    font-size: 36px;
    font-weight: bold;
    color: #4caf50;
    animation: popout-animation 1s ease-out forwards;
    opacity: 0;
    transform: scale(0.5);
  }

  @keyframes popout-animation {
    0% {
      opacity: 0;
      transform: scale(0.5);
    }
    50% {
      opacity: 1;
      transform: scale(1.2);
    }
    100% {
      transform: scale(1);
    }
  }
</style>

<script>
  // Redirect to the orders page after 3 seconds
  setTimeout(() => {
    window.location.href = "{% url 'view-requests' %}";
  }, 3000);
</script>
{% endblock %}
