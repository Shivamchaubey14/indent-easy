{% extends "base.html" %}
{% block content %}
<div>
    <h2 class="text-center fw-bold mb-3">{{request.user}}</h2>
    <h3 class="text-center fw-bold mb-4">Send This To MCC</h3>
</div>
<div class="container mt-4">
    <form method="post" action="#">{% csrf_token %}
        <div class="table-responsive">
            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>Location</th>
                        <th>Product Name</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <select class="form-select searchable-dropdown" name="location" required>
                                <option value="" disabled selected>Select Location</option>
                                {% for location in locations %}
                                    <option value="{{ location.location }}">{{ location.location }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <select class="form-select searchable-dropdown" name="product_name" required>
                                <option value="" disabled selected>Select Product</option>
                                {% for product in products %}
                                    <option value="{{ product.name }}">{{ product.name }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <input type="number" class="form-control" name="quantity" placeholder="Enter Quantity" required min="1">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary">Submit Order</button>
        </div>
    </form>
</div>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

<script>
    $(document).ready(function() {
        $('.searchable-dropdown').select2({
            placeholder: "Select an option",
            allowClear: true
        });
    });
</script>
{% endblock %}
